# Homologação — app + Postgres local
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pappi
      POSTGRES_PASSWORD: pappi_staging
      POSTGRES_DB: pappi_staging
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
      - ./docker/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pappi -d pappi_staging"]
      interval: 5s
      timeout: 3s
      retries: 5

  pappi:
    build: .
    restart: unless-stopped
    ports:
      - "10001:10000"
    env_file: .env.staging
    environment:
      - NODE_ENV=staging
      - PORT=10000
      - DATABASE_URL=postgresql://pappi:pappi_staging@postgres:5432/pappi_staging
      - DIRECT_URL=postgresql://pappi:pappi_staging@postgres:5432/pappi_staging
      - WEB_CONCURRENCY=1
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_staging:
