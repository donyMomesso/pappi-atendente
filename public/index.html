<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pappi Atendente — Painel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .badge-waiting   { background:#854d0e; color:#fef08a; }
    .badge-confirmed { background:#14532d; color:#86efac; }
    .badge-cancelled { background:#7f1d1d; color:#fca5a5; }
    .badge-delivered { background:#1e3a5f; color:#93c5fd; }
    .badge-handoff   { background:#4c1d95; color:#c4b5fd; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#1e293b; }
    ::-webkit-scrollbar-thumb { background:#475569; border-radius:3px; }
    input, textarea { background:#0f172a; border:1px solid #334155; color:#f1f5f9; }
    input:focus, textarea:focus { outline:none; border-color:#6366f1; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">

  <!-- Login -->
  <div id="login" class="fixed inset-0 flex items-center justify-center z-50" style="background:#0f172a">
    <div class="card rounded-2xl p-8 w-96 text-center">
      <div class="text-4xl mb-2">🍕</div>
      <h1 class="text-2xl font-bold mb-1">Pappi Atendente</h1>
      <p class="text-slate-400 text-sm mb-6">Painel de Atendimento</p>
      <input id="apiKey" type="password" placeholder="Chave de acesso"
        class="w-full rounded-lg px-4 py-3 mb-4 text-sm" />
      <button onclick="doLogin()"
        class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-lg py-3 font-semibold transition">
        Entrar
      </button>
      <p id="loginErr" class="text-red-400 text-sm mt-3 hidden">Chave inválida</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">

    <!-- Header -->
    <header class="border-b border-slate-700 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🍕</span>
        <div>
          <h1 class="font-bold text-lg leading-none">Pappi Atendente</h1>
          <p class="text-slate-400 text-xs">Painel de Atendimento</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="storeStatus" class="text-xs px-3 py-1 rounded-full bg-slate-700">Carregando...</div>
        <div id="lastUpdate" class="text-slate-500 text-xs"></div>
        <button onclick="logout()" class="text-slate-400 hover:text-white text-sm transition">Sair</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 p-6 pb-0">
      <div class="card rounded-xl p-4">
        <p class="text-slate-400 text-xs mb-1">Pedidos hoje</p>
        <p id="st-orders" class="text-3xl font-bold">—</p>
      </div>
      <div class="card rounded-xl p-4">
        <p class="text-slate-400 text-xs mb-1">Faturamento hoje</p>
        <p id="st-revenue" class="text-3xl font-bold text-green-400">—</p>
      </div>
      <div class="card rounded-xl p-4">
        <p class="text-slate-400 text-xs mb-1">Clientes</p>
        <p id="st-customers" class="text-3xl font-bold">—</p>
      </div>
      <div class="card rounded-xl p-4">
        <p class="text-slate-400 text-xs mb-1">Aguardando humano</p>
        <p id="st-handoff" class="text-3xl font-bold text-violet-400">—</p>
      </div>
      <div class="card rounded-xl p-4">
        <p class="text-slate-400 text-xs mb-1">Total pedidos</p>
        <p id="st-total" class="text-3xl font-bold text-slate-300">—</p>
      </div>
    </div>

    <!-- Main -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 p-6">

      <!-- Conversas -->
      <div class="card rounded-xl flex flex-col" style="max-height:70vh">
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-700">
          <h2 class="font-semibold">💬 Conversas</h2>
          <span id="conv-count" class="text-xs text-slate-400"></span>
        </div>
        <div id="conv-list" class="overflow-y-auto flex-1 divide-y divide-slate-700/50"></div>
      </div>

      <!-- Pedidos do dia -->
      <div class="card rounded-xl flex flex-col" style="max-height:70vh">
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-700">
          <h2 class="font-semibold">📦 Pedidos de hoje</h2>
          <span id="orders-count" class="text-xs text-slate-400"></span>
        </div>
        <div id="orders-list" class="overflow-y-auto flex-1 divide-y divide-slate-700/50"></div>
      </div>

    </div>
  </div>

  <!-- Modal enviar mensagem -->
  <div id="modal-send" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
    <div class="card rounded-2xl p-6 w-full max-w-md mx-4">
      <h3 class="font-semibold mb-1">Enviar mensagem</h3>
      <p id="modal-phone-label" class="text-slate-400 text-sm mb-4"></p>
      <input id="modal-phone" type="hidden" />
      <textarea id="modal-text" rows="3" placeholder="Digite a mensagem..."
        class="w-full rounded-lg px-4 py-3 mb-4 text-sm resize-none"></textarea>
      <div class="flex gap-3">
        <button onclick="closeSend()" class="flex-1 bg-slate-700 hover:bg-slate-600 rounded-lg py-2 text-sm transition">Cancelar</button>
        <button onclick="sendMsg()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 rounded-lg py-2 text-sm font-semibold transition">Enviar</button>
      </div>
    </div>
  </div>

<script>
const TENANT = "tenant-pappi-001";
let API_KEY = "";
let refreshTimer = null;

function doLogin() {
  const key = document.getElementById("apiKey").value.trim();
  if (!key) return;
  API_KEY = key;
  fetchStats().then(ok => {
    if (ok) {
      document.getElementById("login").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      startRefresh();
    } else {
      document.getElementById("loginErr").classList.remove("hidden");
      API_KEY = "";
    }
  });
}

function logout() {
  API_KEY = "";
  clearInterval(refreshTimer);
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

document.getElementById("apiKey").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

async function apiFetch(path) {
  const r = await fetch(`/dash${path}?tenant=${TENANT}&key=${encodeURIComponent(API_KEY)}`);
  if (!r.ok) return null;
  return r.json();
}

async function fetchStats() {
  const data = await apiFetch("/stats");
  if (!data) return false;
  document.getElementById("st-orders").textContent    = data.ordersToday;
  document.getElementById("st-revenue").textContent   = "R$ " + data.revenueToday.toFixed(2);
  document.getElementById("st-customers").textContent = data.customersTotal;
  document.getElementById("st-handoff").textContent   = data.handoffActive;
  document.getElementById("st-total").textContent     = data.ordersTotal;
  document.getElementById("lastUpdate").textContent   = "Atualizado " + new Date().toLocaleTimeString("pt-BR");
  return true;
}

async function fetchConversations() {
  const data = await apiFetch("/conversations");
  if (!data) return;
  document.getElementById("conv-count").textContent = data.length + " clientes";
  const list = document.getElementById("conv-list");
  list.innerHTML = data.map(c => `
    <div class="px-5 py-4 hover:bg-slate-700/30 transition">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="font-medium truncate">${esc(c.name)}</span>
            ${c.handoff ? '<span class="badge-handoff text-xs px-2 py-0.5 rounded-full pulse">🙋 Humano</span>' : ''}
          </div>
          <p class="text-slate-400 text-xs">${esc(c.phoneFormatted)} · ${c.visitCount} visitas</p>
          ${c.lastAddress ? `<p class="text-slate-500 text-xs truncate mt-0.5">📍 ${esc(c.lastAddress)}</p>` : ''}
          ${c.lastOrder ? `<p class="text-xs mt-1 ${statusColor(c.lastOrder.status)}">Último pedido: ${statusLabel(c.lastOrder.status)} · R$ ${c.lastOrder.total.toFixed(2)}</p>` : ''}
        </div>
        <div class="flex flex-col gap-1 shrink-0">
          <button onclick="toggleHandoff('${c.id}',${!c.handoff},'${c.phone}')"
            class="text-xs px-3 py-1 rounded-lg transition ${c.handoff ? 'bg-green-800 hover:bg-green-700 text-green-200' : 'bg-violet-800 hover:bg-violet-700 text-violet-200'}">
            ${c.handoff ? '🤖 Devolver bot' : '👨‍💼 Assumir'}
          </button>
          <button onclick="openSend('${c.phone}','${esc(c.name)}')"
            class="text-xs px-3 py-1 rounded-lg bg-slate-700 hover:bg-slate-600 transition">
            ✉️ Mensagem
          </button>
        </div>
      </div>
    </div>
  `).join("");
}

async function fetchOrders() {
  const data = await apiFetch("/orders");
  if (!data) return;
  document.getElementById("orders-count").textContent = data.length + " pedidos";
  const list = document.getElementById("orders-list");
  list.innerHTML = data.length === 0
    ? '<p class="text-slate-500 text-sm text-center py-8">Nenhum pedido hoje</p>'
    : data.map(o => `
    <div class="px-5 py-4">
      <div class="flex items-start justify-between gap-2 mb-2">
        <div>
          <div class="flex items-center gap-2">
            <span class="font-medium text-sm">${esc(o.customer.name)}</span>
            <span class="badge-${o.status.includes('cancel') ? 'cancelled' : o.status.includes('deliver') ? 'delivered' : o.status.includes('confirm') ? 'confirmed' : 'waiting'} text-xs px-2 py-0.5 rounded-full">${statusLabel(o.status)}</span>
          </div>
          <p class="text-slate-400 text-xs">${esc(o.customer.phone)} · ${o.fulfillment === 'delivery' ? '🛵 Entrega' : '🏪 Retirada'} · ${esc(o.paymentMethodName || '—')}</p>
        </div>
        <div class="text-right shrink-0">
          <p class="font-bold text-green-400">R$ ${o.total.toFixed(2)}</p>
          <p class="text-slate-500 text-xs">${new Date(o.createdAt).toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"})}</p>
        </div>
      </div>
      <div class="text-xs text-slate-400 space-y-0.5">
        ${o.items.slice(0,3).map(i => `<span class="inline-block bg-slate-700 rounded px-2 py-0.5 mr-1">${i.quantity}x ${esc(i.name)}</span>`).join('')}
        ${o.items.length > 3 ? `<span class="text-slate-500">+${o.items.length-3} itens</span>` : ''}
      </div>
      ${o.address ? `<p class="text-slate-500 text-xs mt-1 truncate">📍 ${esc(o.address.formatted || '')}</p>` : ''}
    </div>
  `).join("");
}

async function toggleHandoff(customerId, enabled, phone) {
  await fetch(`/dash/handoff?key=${encodeURIComponent(API_KEY)}`, {
    method: "PUT",
    headers: {"Content-Type":"application/json","x-api-key":API_KEY},
    body: JSON.stringify({ customerId, enabled, tenantId: TENANT })
  });
  refreshAll();
}

function openSend(phone, name) {
  document.getElementById("modal-phone").value = phone;
  document.getElementById("modal-phone-label").textContent = "Para: " + name + " (" + phone + ")";
  document.getElementById("modal-text").value = "";
  document.getElementById("modal-send").classList.remove("hidden");
  document.getElementById("modal-text").focus();
}

function closeSend() {
  document.getElementById("modal-send").classList.add("hidden");
}

async function sendMsg() {
  const phone = document.getElementById("modal-phone").value;
  const text  = document.getElementById("modal-text").value.trim();
  if (!text) return;
  await fetch(`/dash/send?key=${encodeURIComponent(API_KEY)}`, {
    method: "POST",
    headers: {"Content-Type":"application/json","x-api-key":API_KEY},
    body: JSON.stringify({ phone, text, tenantId: TENANT })
  });
  closeSend();
}

function refreshAll() {
  Promise.all([fetchStats(), fetchConversations(), fetchOrders()]);
}

function startRefresh() {
  refreshAll();
  refreshTimer = setInterval(refreshAll, 5000);
}

// Helpers
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function statusLabel(s) {
  return {
    waiting_confirmation:"⏳ Aguardando",confirmed:"✅ Confirmado",
    preparing:"👨‍🍳 Preparando",ready:"✅ Pronto",dispatched:"🛵 A caminho",
    delivered:"🏠 Entregue",cancelled:"❌ Cancelado"
  }[s] || s;
}
function statusColor(s) {
  if (s.includes("cancel")) return "text-red-400";
  if (s.includes("deliver")) return "text-blue-400";
  if (s.includes("confirm") || s.includes("prepar") || s.includes("ready")) return "text-green-400";
  return "text-yellow-400";
}
</script>
</body>
</html>
