# Produção — monólito + Postgres externo
# Use DATABASE_URL e DIRECT_URL do .env para banco remoto (Supabase etc)
# Este compose NÃO sobe Postgres — use banco gerenciado.

version: "3.8"

services:
  pappi:
    build: .
    restart: unless-stopped
    ports:
      - "10000:10000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - WEB_CONCURRENCY=1
      - RUN_JOBS=true
      - RUN_BAILEYS=true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
