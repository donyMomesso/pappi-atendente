# Render — recomendado para QR/Baileys estável em plano pago
# Separe WEB e BAILEYS em serviços distintos para evitar disputa de sessão e restart do socket junto do painel.

services:
  - type: web
    name: pappi-atendente-web
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm run start:web
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: prod
      - key: APP_RUNTIME
        value: web
      - key: BAILEYS_INSTANCE_MODE
        value: dedicated
      - key: RUN_BAILEYS
        value: "false"
      - key: RUN_JOBS
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WABA_ID
        sync: false
      - key: CARDAPIOWEB_BASE_URL
        value: https://integracao.cardapioweb.com
      - key: CARDAPIOWEB_API_KEY
        sync: false
      - key: CARDAPIOWEB_PARTNER_KEY
        sync: false
      - key: CARDAPIOWEB_STORE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ATTENDANT_API_KEY
        sync: false
      - key: METRICS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: worker
    name: pappi-atendente-baileys
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start:baileys
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: prod
      - key: APP_RUNTIME
        value: baileys
      - key: BAILEYS_INSTANCE_MODE
        value: dedicated
      - key: RUN_BAILEYS
        value: "true"
      - key: RUN_JOBS
        value: "false"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BAILEYS_ENABLED
        value: "true"
      - key: BAILEYS_LOCK_TTL_MS
        value: "90000"
      - key: BAILEYS_QR_TIMEOUT_MS
        value: "300000"
      - key: BAILEYS_CONNECT_TIMEOUT_MS
        value: "300000"
      - key: BAILEYS_CLEAR_AUTH_ON_440
        value: "false"
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WABA_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
