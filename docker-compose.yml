version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pappi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pappi
      POSTGRES_PASSWORD: pappi123
      POSTGRES_DB: pappi_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pappi -d pappi_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
